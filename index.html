<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Controle — Grupo J.Macedo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#050914;
    --bg-1:#0A1224;
    --panel:#0D1830;
    --panel-2:#101d3a;
    --line: rgba(148,178,255,0.14);
    --blue-1:#0B3FA8;
    --blue-2:#1B57D8;
    --blue-3:#4C93FF;
    --blue-glow: rgba(76,147,255,0.35);
    --white:#F4F8FF;
    --muted:#8FA2C7;
    --muted-2:#5D6E90;
    --ok:#38D39F;
    --warn:#F5A524;
    --danger:#F0567A;
    --radius: 18px;
    --shadow: 0 20px 50px -20px rgba(0,10,40,0.7);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1100px 500px at 12% -10%, rgba(30,90,220,0.35), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(60,140,255,0.18), transparent 55%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1) 40%, #060B18 100%);
    color:var(--white);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding: 36px 20px 60px;
  }
  .wrap{ max-width:1280px; margin:0 auto; }

  /* ---------- HEADER ---------- */
  .top{
    display:flex; align-items:flex-end; justify-content:space-between; gap:24px;
    flex-wrap:wrap; margin-bottom:28px;
  }
  .brand-block{ display:flex; align-items:center; gap:20px; }
  .brand-logo-chip{
    background:linear-gradient(180deg,#ffffff,#eef3fb);
    border-radius:16px; padding:16px 24px; flex:none;
    box-shadow:0 10px 28px -10px rgba(0,0,0,0.55), inset 0 0 0 1px rgba(0,0,0,0.03);
  }
  .brand-logo{ height:64px; width:auto; display:block; }
  @media (max-width:640px){
    .brand-block{ flex-direction:column; align-items:flex-start; gap:12px; }
    .brand-logo{ height:46px; }
    .brand-logo-chip{ padding:11px 16px; }
  }
  .brand-eyebrow{
    font-family:'Barlow Condensed'; font-weight:700; letter-spacing:.35em;
    font-size:13px; color:var(--blue-3); text-transform:uppercase; margin:0 0 6px;
    display:flex; align-items:center; gap:10px;
  }
  .brand-eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--blue-3); box-shadow:0 0 12px var(--blue-3);}
  h1.title{
    font-family:'Barlow Condensed'; font-weight:800; font-size:clamp(32px,4.2vw,52px);
    letter-spacing:.01em; margin:0; line-height:1.02; text-transform:uppercase;
    background:linear-gradient(90deg,#ffffff, #b9d3ff 60%, #7fb0ff);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subtitle{ color:var(--muted); font-size:14.5px; margin-top:8px; max-width:520px; }

  .sync-all{
    display:flex; align-items:center; gap:10px;
    background:linear-gradient(180deg, var(--blue-2), var(--blue-1));
    border:1px solid rgba(255,255,255,0.12);
    padding:12px 20px; border-radius:14px; cursor:pointer;
    font-weight:700; font-size:13.5px; letter-spacing:.03em; color:#fff;
    box-shadow: 0 10px 30px -8px rgba(30,90,220,0.6);
    transition: transform .15s ease, box-shadow .15s ease;
    white-space:nowrap;
  }
  .sync-all:hover{ transform:translateY(-2px); box-shadow:0 14px 34px -6px rgba(30,90,220,0.8); }
  .sync-all svg{ width:16px; height:16px; }
  .sync-all.spinning svg{ animation: spin 1s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ---------- SUMMARY STRIP ---------- */
  .summary{
    display:grid; grid-template-columns: 1.3fr repeat(4, 1fr);
    gap:1px; background:var(--line);
    border:1px solid var(--line); border-radius:var(--radius);
    overflow:hidden; margin-bottom:34px; box-shadow:var(--shadow);
  }
  .summary > div{
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    padding:22px 24px; position:relative;
  }
  .summary .label{
    font-size:11.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted-2);
    font-weight:700; margin-bottom:10px; display:block;
  }
  .summary .big{
    font-family:'Barlow Condensed'; font-weight:800; font-size:40px; line-height:1;
    color:var(--white);
  }
  .summary .big small{ font-size:16px; color:var(--muted); font-weight:600; margin-left:4px;}
  .summary .hero{
    display:flex; flex-direction:column; justify-content:center;
  }
  .summary .hero .big{ font-size:56px; background:linear-gradient(90deg,#fff,#8fc0ff); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .summary .meta{ font-size:12.5px; color:var(--muted); margin-top:6px; }
  .summary .accent-bar{ position:absolute; left:0; top:0; bottom:0; width:3px; }

  /* ---------- GRID OF UNITS ---------- */
  .grid{
    display:grid; grid-template-columns:repeat(2, 1fr); gap:22px;
  }
  @media (max-width:880px){ .grid{ grid-template-columns:1fr; } .summary{ grid-template-columns:1fr 1fr; } }

  .card{
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line); border-radius:var(--radius);
    overflow:hidden; box-shadow:var(--shadow);
    display:flex; flex-direction:column;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    position:relative;
  }
  .card:hover{ transform:translateY(-4px); border-color:rgba(140,180,255,0.35); }
  .card.span-2{ grid-column: span 2; }
  @media (max-width:880px){ .card.span-2{ grid-column: span 1; } }

  .card-link{ display:block; position:relative; text-decoration:none; }
  .card-link img{ display:block; width:100%; height:auto; }
  .card-link .go-badge{
    position:absolute; right:16px; bottom:16px;
    display:flex; align-items:center; gap:8px;
    background:rgba(6,12,26,0.55); backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,0.18);
    color:#fff; font-size:11.5px; font-weight:700; letter-spacing:.05em;
    padding:7px 12px; border-radius:999px; opacity:0; transform:translateY(6px);
    transition:.18s ease;
  }
  .card-link:hover .go-badge{ opacity:1; transform:translateY(0); }

  .card-body{ padding:20px 22px 22px; display:flex; flex-direction:column; gap:14px; flex:1; }

  .row-between{ display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }

  .update-info{ display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--muted); }
  .update-info .led{ width:7px; height:7px; border-radius:50%; background:var(--muted-2); flex:none; }
  .update-info.ok .led{ background:var(--ok); box-shadow:0 0 8px var(--ok); }
  .update-info.warn .led{ background:var(--warn); box-shadow:0 0 8px var(--warn); }
  .update-info.err .led{ background:var(--danger); box-shadow:0 0 8px var(--danger); }

  .icon-btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    background:rgba(255,255,255,0.05); border:1px solid var(--line); color:var(--muted);
    font-size:11.5px; font-weight:700; letter-spacing:.03em;
    padding:6px 11px; border-radius:9px; cursor:pointer; transition:.15s ease;
  }
  .icon-btn:hover{ background:rgba(76,147,255,0.14); color:#fff; border-color:rgba(140,180,255,0.4); }
  .icon-btn svg{ width:13px; height:13px; }
  .icon-btn.spinning svg{ animation: spin .9s linear infinite; }

  .totals-row{ display:flex; align-items:baseline; gap:10px; }
  .totals-row .num{ font-family:'Barlow Condensed'; font-weight:800; font-size:40px; line-height:1; }
  .totals-row .num.zero{ color:var(--ok); }
  .totals-row .lbl{ font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted-2); font-weight:700; }

  .cats{ display:flex; flex-direction:column; gap:10px; }
  .cat-row{ display:flex; flex-direction:column; gap:5px; }
  .cat-top{ display:flex; justify-content:space-between; font-size:12.5px; }
  .cat-top .name{ color:#DCE6FF; font-weight:600; letter-spacing:.02em; }
  .cat-top .count{ color:var(--muted); font-variant-numeric:tabular-nums; }
  .bar-track{ height:7px; border-radius:5px; background:rgba(255,255,255,0.06); overflow:hidden; }
  .bar-fill{ height:100%; border-radius:5px; background:linear-gradient(90deg, var(--blue-1), var(--blue-3)); transition:width .5s ease; }

  .empty-cats{ font-size:12.5px; color:var(--muted-2); font-style:italic; padding:6px 0; }

  .card-footer{ margin-top:auto; display:flex; justify-content:space-between; align-items:center; gap:10px; padding-top:4px; border-top:1px dashed var(--line); }
  .note{ font-size:11px; color:var(--muted-2); line-height:1.4; }
  .note.err{ color:var(--danger); }

  /* ---------- SHORTCUT CARD (ex: One Stop) ---------- */
  .shortcut-tag{
    position:absolute; left:16px; top:16px; z-index:2;
    background:rgba(6,12,26,0.6); backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,0.18); color:#fff;
    font-size:10.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
    padding:6px 12px; border-radius:999px;
  }
  .shortcut-footer{
    padding:16px 22px 20px; display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .shortcut-footer .txt{ font-size:12.5px; color:var(--muted); }
  .shortcut-footer .txt b{ color:#DCE6FF; }

  .footer-note{ text-align:center; color:var(--muted-2); font-size:11.5px; margin-top:36px; line-height:1.6; }
  .footer-note a{ color:var(--blue-3); }

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#0E1930; border:1px solid var(--line); color:#fff; padding:12px 18px;
    border-radius:12px; font-size:13px; box-shadow:var(--shadow); opacity:0; transition:.25s ease; z-index:60;
    pointer-events:none;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>

// Atalhos: apenas redirecionam, sem sincronizar nem contar no total do grupo.
const SHORTCUTS = [
  {
    id: 'onestop_dutra',
    after: 'msc_cidadedutra',
    name: 'MSC C.Dutra · One Stop',
    url: 'https://onestop-cidade-dutra.github.io/onestop/Dashboard_OneStop.html',
    img: IMG_ONESTOP,
  },
];

const STATUS_CONCLUIDO = 'Reparo Completo';

// state[id] = { lastUpdate, cats:[{label,count}], status:'idle'|'ok'|'error', note, source }
let state = {};

function defaultData(unit){
  return {
    lastUpdate: null,
    cats: unit.defaultCats.map(c => ({label:c, count:0})),
    status: 'idle',
    note: '',
    source: null
  };
}

async function loadState(){
  for (const unit of UNITS){
    try{
      const res = await window.storage.get('unidade:'+unit.id, true);
      state[unit.id] = res ? JSON.parse(res.value) : defaultData(unit);
    }catch(e){
      state[unit.id] = defaultData(unit);
    }
  }
}

async function persist(id){
  try{
    await window.storage.set('unidade:'+id, JSON.stringify(state[id]), true);
  }catch(e){
    console.error('storage error', e);
  }
}

function totalOf(id){
  return state[id].cats.reduce((s,c)=>s+(Number(c.count)||0),0);
}

function fmtNow(){
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), 3000);
}

// ---------- EXTRACAO DOS DADOS REAIS (const DATA = [...];) ----------
// Faz um parse tolerante a strings, respeitando aspas e escapes, para
// isolar exatamente o array JSON embutido pelo gerador Python.
function extractDataArray(text){
  const marker = /const\s+DATA\s*=/;
  const m = marker.exec(text);
  if(!m) return null;
  let i = m.index + m[0].length;
  while(/\s/.test(text[i])) i++;
  if(text[i] !== '[') return null;
  let depth = 0, start = i, inStr = false, strCh = '', esc = false;
  for(; i < text.length; i++){
    const c = text[i];
    if(inStr){
      if(esc) esc = false;
      else if(c === '\\') esc = true;
      else if(c === strCh) inStr = false;
      continue;
    }
    if(c === '"' || c === "'"){ inStr = true; strCh = c; continue; }
    if(c === '[') depth++;
    else if(c === ']'){ depth--; if(depth === 0){ i++; break; } }
  }
  const rawSlice = text.slice(start, i);
  return JSON.parse(rawSlice);
}

function extractLastUpdate(text){
  const patterns = [
    /[UÚ]ltima atualiza[cç][aã]o:?\s*([0-9]{2}\/[0-9]{2}\/[0-9]{4}\s+[0-9]{2}:[0-9]{2})/i,
    /Gerado em:?\s*([0-9]{2}\/[0-9]{2}\/[0-9]{4}\s+[0-9]{2}:[0-9]{2})/i,
  ];
  for(const p of patterns){
    const m = text.match(p);
    if(m) return m[1];
  }
  return null;
}

function computeCatsFromRows(rows, unit){
  const abertos = rows.filter(r => (r.status || '') !== STATUS_CONCLUIDO);
  const counts = {};
  abertos.forEach(r=>{
    const cat = r.cat || r.categoria || 'OUTROS';
    counts[cat] = (counts[cat] || 0) + 1;
  });
  const labels = new Set([...unit.defaultCats, ...Object.keys(counts)]);
  return [...labels].map(label => ({label, count: counts[label] || 0}))
    .filter(c => c.count > 0 || unit.defaultCats.includes(c.label));
}

// ---------- SINCRONIZACAO (leitura publica, sem credenciais) ----------
async function trySync(unit){
  const s = state[unit.id];
  let lastErr = null;
  for(const rawUrl of unit.raw){
    try{
      const res = await fetch(rawUrl, {cache:'no-store'});
      if(!res.ok){ lastErr = 'HTTP '+res.status; continue; }
      const text = await res.text();
      const rows = extractDataArray(text);
      if(!rows){ lastErr = 'formato de dados não reconhecido'; continue; }
      s.cats = computeCatsFromRows(rows, unit);
      s.lastUpdate = extractLastUpdate(text) || fmtNow();
      s.status = 'ok';
      s.source = rawUrl;
      s.note = '';
      await persist(unit.id);
      return true;
    }catch(e){
      lastErr = e.message || String(e);
    }
  }
  s.status = 'error';
  s.note = 'Não foi possível sincronizar automaticamente (' + (lastErr || 'falha de rede') + ').';
  await persist(unit.id);
  return false;
}

async function syncOne(id, btnEl){
  const unit = UNITS.find(u=>u.id===id);
  if(btnEl) btnEl.classList.add('spinning');
  const ok = await trySync(unit);
  render();
  if(btnEl) btnEl.classList.remove('spinning');
  showToast(ok ? `${unit.name}: sincronizado.` : `${unit.name}: sincronização automática indisponível.`);
}

async function syncAll(){
  const btn = document.getElementById('syncAllBtn');
  btn.classList.add('spinning');
  const results = await Promise.all(UNITS.map(u=>trySync(u)));
  document.getElementById('globalSyncTime').textContent = fmtNow();
  render();
  btn.classList.remove('spinning');
  const okCount = results.filter(Boolean).length;
  showToast(`Sincronização concluída: ${okCount}/${UNITS.length} unidades atualizadas automaticamente.`);
}

function svgSync(){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>`;
}
function svgArrow(){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>`;
}

// ---------- RENDER ----------
function statusInfo(s){
  if(s.status === 'ok') return {cls:'ok', label: s.lastUpdate ? 'Sincronizado · ' + s.lastUpdate : 'Sincronizado'};
  if(s.status === 'error') return {cls:'err', label: 'Falha na sincronização automática'};
  return {cls:'warn', label: 'Aguardando sincronização'};
}

function unitCardHtml(u){
  const s = state[u.id];
  const total = totalOf(u.id);
  const info = statusInfo(s);
  const catsHtml = s.cats.length ? s.cats.map(c=>{
    const pct = total ? Math.round((c.count/total)*100) : 0;
    return `<div class="cat-row">
      <div class="cat-top"><span class="name">${c.label}</span><span class="count">${c.count} · ${pct}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:linear-gradient(90deg, ${u.accent}99, ${u.accent})"></div></div>
    </div>`;
  }).join('') : `<div class="empty-cats">Nenhuma categoria cadastrada ainda.</div>`;

  return `
  <div class="card">
    <a class="card-link" href="${u.url}" target="_blank" rel="noopener noreferrer">
      <img src="${u.img}" alt="${u.name}" loading="lazy">
      <span class="go-badge">${svgArrow()} ABRIR DASHBOARD</span>
    </a>
    <div class="card-body">
      <div class="row-between">
        <div class="update-info ${info.cls}"><span class="led"></span>${info.label}</div>
        <button class="icon-btn" onclick="syncOne('${u.id}', this)">${svgSync()} Sincronizar</button>
      </div>

      <div class="row-between">
        <div class="totals-row">
          <span class="num ${total===0?'zero':''}">${total}</span>
          <span class="lbl">pendências ativas</span>
        </div>
      </div>

      <div class="cats">${catsHtml}</div>

      ${s.status==='error' ? `<div class="card-footer"><span class="note err">${s.note}</span></div>` : ''}
    </div>
  </div>`;
}

function shortcutCardHtml(sc){
  return `
  <div class="card">
    <span class="shortcut-tag">Atalho</span>
    <a class="card-link" href="${sc.url}" target="_blank" rel="noopener noreferrer">
      <img src="${sc.img}" alt="${sc.name}" loading="lazy">
      <span class="go-badge">${svgArrow()} ABRIR ONE STOP</span>
    </a>
    <div class="shortcut-footer">
      <span class="txt">Acesso direto ao <b>${sc.name}</b> — sem sincronização de pendências.</span>
    </div>
  </div>`;
}

function render(){
  const totalGroup = UNITS.reduce((sum,u)=> sum + totalOf(u.id), 0);
  const summary = document.getElementById('summaryStrip');
  summary.innerHTML = `
    <div class="hero">
      <span class="label">Total de pendências · Grupo</span>
      <div class="big">${totalGroup}<small>ordens de serviço</small></div>
      <div class="meta">Somatório das ${UNITS.length} unidades monitoradas</div>
    </div>
    ${UNITS.map(u=>{
      const t = totalOf(u.id);
      const pct = totalGroup ? Math.round((t/totalGroup)*100) : 0;
      return `<div>
        <div class="accent-bar" style="background:${u.accent}"></div>
        <span class="label">${u.group} · ${u.name.replace(u.group+' ','')}</span>
        <div class="big">${t}<small>${totalGroup? pct+'%':''}</small></div>
        <div class="meta">${state[u.id].lastUpdate ? 'Atualizado ' + state[u.id].lastUpdate : 'Sem sincronização'}</div>
      </div>`;
    }).join('')}
  `;

  // monta a grade intercalando atalhos na posicao definida (after: <unitId>)
  const cards = [];
  UNITS.forEach(u=>{
    cards.push(unitCardHtml(u));
    SHORTCUTS.filter(sc=>sc.after===u.id).forEach(sc=> cards.push(shortcutCardHtml(sc)));
  });
  SHORTCUTS.filter(sc=>!UNITS.some(u=>u.id===sc.after)).forEach(sc=> cards.push(shortcutCardHtml(sc)));

  document.getElementById('unitsGrid').innerHTML = cards.join('');
}

(async function init(){
  await loadState();
  render();
  syncAll();
})();
</script>
